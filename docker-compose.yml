version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: raize-mysql
    restart: always
    environment:
      MYSQL_DATABASE: raize_study
      MYSQL_ROOT_PASSWORD: "123456"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend-spring-boot
      dockerfile: Dockerfile
    container_name: raize-backend
    restart: always
    ports:
      - "8085:8080"
    environment:
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_NAME: raize_study
      DB_USER: root
      DB_PASS: "123456"
      JWT_SECRET: raize_study_jwt_secret_key_2026_raize_study_jwt_secret_key_2026
    depends_on:
      mysql-db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    container_name: raize-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
